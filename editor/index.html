<!DOCTYPE html><html lang="it"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Editor testi — Portrait Realism Academy</title>
<style>
 :root{--bg:#0c0c0e;--panel:#141416;--bone:#ece7dd;--mut:#8b8983;--acc:#c9ccce;--ok:#7fe3c0;--line:rgba(236,231,221,.12)}
 *{box-sizing:border-box;margin:0;padding:0}
 body{background:var(--bg);color:var(--bone);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;line-height:1.5}
 header{position:sticky;top:0;z-index:5;background:rgba(12,12,14,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
 header h1{font-size:15px;letter-spacing:.5px;font-weight:600}
 .status{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:7px}
 .dot{width:8px;height:8px;border-radius:50%;background:#555;transition:.3s}
 .dot.on{background:var(--ok);box-shadow:0 0 8px rgba(127,227,192,.6)}
 .who{margin-left:auto;font-size:12px;color:var(--acc)}
 .wrap{max-width:820px;margin:0 auto;padding:20px 20px 80px}
 .hint{font-size:13px;color:var(--mut);background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:20px}
 .grp{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--acc);margin:26px 0 10px}
 .fld{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:12px}
 .fld label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);margin-bottom:7px}
 .fld textarea{width:100%;background:#0a0a0c;border:1px solid var(--line);color:var(--bone);border-radius:7px;padding:11px 12px;font-family:inherit;font-size:15px;line-height:1.45;resize:vertical;min-height:44px}
 .fld textarea:focus{outline:0;border-color:var(--acc)}
 .fld.saved textarea{border-color:rgba(127,227,192,.45)}
 .fld .edited{font-size:11px;color:var(--mut);margin-top:6px;min-height:14px}
 .bar{position:fixed;bottom:0;left:0;right:0;background:rgba(12,12,14,.96);border-top:1px solid var(--line);padding:12px 20px;display:flex;gap:12px;align-items:center;justify-content:center;font-size:12px;color:var(--mut)}
 .name-in{background:#0a0a0c;border:1px solid var(--line);color:var(--bone);border-radius:6px;padding:6px 10px;font-size:13px;width:150px}
 .setup{background:#2a1414;border:1px solid #6b3b3b;color:#f0c9b0;padding:14px 16px;border-radius:10px;margin-bottom:20px;font-size:13px;display:none}
</style></head>
<body>
<header>
  <h1>✍️ Editor testi — Academy</h1>
  <div class="status"><span class="dot" id="dot"></span><span id="st">connecting…</span></div>
  <div class="who" id="who"></div>
</header>
<div class="wrap">
  <div class="setup" id="setup"></div>
  <div class="hint">Modifica un testo → si <b>salva da solo</b> e chiunque abbia questo link lo vede <b>in tempo reale</b>. Nessun login. Metti il tuo nome sotto così sappiamo chi edita.</div>
  <div id="fields"></div>
</div>
<div class="bar">
  <span>Il tuo nome:</span><input class="name-in" id="name" placeholder="es. Federico" maxlength="24">
  <span id="savecount"></span>
</div>

<script>
/* ====== CONFIG ====== */
var DB_URL='__DB_URL__';   /* Firebase Realtime Database URL, es. https://xxx-default-rtdb.europe-west1.firebasedatabase.app */

/* ====== editable blocks (id · label · default text) ====== */
var BLOCKS=[
 ['—','HERO'],
 ['hero_eyebrow','Hero · sopra-titolo','Black & grey portrait masterclass · Milwaukee · Oct 6–8, 2026'],
 ['hero_h1a','Hero · titolo riga 1','Stop hoping your portraits heal well.'],
 ['hero_h1b','Hero · titolo riga 2 (corsivo)','Master the system that makes them last.'],
 ['hero_sub','Hero · sottotitolo','The 3-day grey-wash masterclass with Federico Galliani — "Portrait KID". The method that takes you from intermediate to the top tier of black & grey realism.'],
 ['hero_cta1','Hero · pulsante 1','Claim one of the 10 seats'],
 ['hero_cta2','Hero · pulsante 2','See the proof'],
 ['—','SEZIONI'],
 ['problem_h2','Problema · titolo','Anyone can nail the photo. Almost no one nails the next ten years.'],
 ['proof_h2','Look closer · titolo','Look closer.'],
 ['craft_h2','Dotwork · titolo','Realism is precision, repeated.'],
 ['method_h2','Metodo · titolo','Three days that rewire how you build a portrait.'],
 ['day1','Giorno 1 · testo','The grey-wash system from the ground up: reference reading, values & tones, black-and-water mixing, machine & needle setup and skin theory. Plus a full module on branding & social — a portfolio that converts, tattoo photography, content strategy.'],
 ['day2','Giorno 2 · testo','Federico tattoos a full portrait in front of you, narrating every decision — layering, saturation, skin tones, highlights, and the details that separate a good portrait from a great one.'],
 ['day3','Giorno 3 · testo','You. The machine. Synthetic skin. And Federico right beside you — correcting your dilution, your angle, your pressure in real time as you tattoo your own portrait.'],
 ['statement_h2','Statement · titolo','This is the level. In three days, it\'s your hand.'],
 ['—','PREZZO & POSTI'],
 ['pricing_h2','Prezzo · titolo','It\'s not a $2,000 cost. It\'s a $2,000 asset.'],
 ['pricing_copy','Prezzo · testo piano','$500 reserves your seat. The $1,500 balance is due one month before the class — by Sept 6, 2026. Prefer to settle it all now? Pay in full below.'],
 ['scarcity_h2','Scarsità · titolo','Why only ten?'],
 ['apply_h2','Apply · titolo','Claim one of the 10 seats.'],
 ['—','ISTRUTTORE'],
 ['instr_quote','Istruttore · citazione','"A portrait isn\'t finished when it\'s fresh. It\'s finished when it still reads years later."'],
 ['instr_bio','Istruttore · bio','Italian black & grey portrait-realism specialist — known as Portrait KID — and co-owner of White Label Tattoo. Twelve years in, award-winning across the U.S. convention circuit with multiple first places, including Baltimore and Chicago, and roughly twenty U.S. conventions behind him. Sponsored by Eclipse Tattoo Ink.']
];

var fieldsEl=document.getElementById('fields'), dot=document.getElementById('dot'), stEl=document.getElementById('st');
var nameEl=document.getElementById('name'), setupEl=document.getElementById('setup');
var refs={}, saveTimers={}, applyingRemote={};
try{nameEl.value=localStorage.getItem('ed_name')||'';}catch(e){}
nameEl.addEventListener('input',function(){try{localStorage.setItem('ed_name',nameEl.value);}catch(e){}});

BLOCKS.forEach(function(b){
 if(b[0]==='—'){var g=document.createElement('div');g.className='grp';g.textContent=b[1];fieldsEl.appendChild(g);return;}
 var id=b[0],label=b[1],def=b[2];
 var d=document.createElement('div');d.className='fld';
 d.innerHTML='<label>'+label+'</label><textarea rows="2"></textarea><div class="edited"></div>';
 var ta=d.querySelector('textarea'); ta.value=def; ta.dataset.id=id;
 refs[id]={ta:ta,box:d,meta:d.querySelector('.edited')};
 autosize(ta);
 ta.addEventListener('input',function(){ autosize(ta); queueSave(id); });
 fieldsEl.appendChild(d);
});
function autosize(ta){ta.style.height='auto';ta.style.height=(ta.scrollHeight+2)+'px';}

/* ---- backend (Firebase RTDB REST + SSE stream) ---- */
function notConfigured(){ return !DB_URL || DB_URL.indexOf('__')===0; }
if(notConfigured()){
 setupEl.style.display='block';
 setupEl.innerHTML='⚙️ Backend non ancora collegato. (Chi ha configurato: incolla l\'URL del Firebase Realtime Database in DB_URL.) Le modifiche per ora restano solo sul tuo schermo.';
 stEl.textContent='offline (demo)';
}

function queueSave(id){
 refs[id].box.classList.remove('saved');
 clearTimeout(saveTimers[id]);
 saveTimers[id]=setTimeout(function(){ save(id); }, 450);
}
function save(id){
 if(notConfigured())return;
 var val=refs[id].ta.value;
 var who=(nameEl.value||'someone').slice(0,24);
 fetch(DB_URL+'/copy/'+id+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({t:val,by:who,at:Date.now()})})
  .then(function(r){ if(r.ok){ refs[id].box.classList.add('saved'); setTimeout(function(){refs[id].box.classList.remove('saved');},900);} });
}
function applyRemote(id,obj){
 if(!refs[id]||!obj)return;
 var ta=refs[id].ta;
 if(document.activeElement===ta) return;       /* non sovrascrivo mentre stai scrivendo */
 if(typeof obj.t==='string' && ta.value!==obj.t){ applyingRemote[id]=1; ta.value=obj.t; autosize(ta); }
 if(obj.by){ refs[id].meta.textContent='ultima modifica: '+obj.by; }
}
function connect(){
 if(notConfigured())return;
 // initial load
 fetch(DB_URL+'/copy.json').then(function(r){return r.json();}).then(function(d){ if(d) for(var k in d) applyRemote(k,d[k]); }).catch(function(){});
 // live stream
 var es=new EventSource(DB_URL+'/copy.json');
 es.addEventListener('open',function(){dot.classList.add('on');stEl.textContent='live · salvataggio automatico';});
 es.addEventListener('error',function(){dot.classList.remove('on');stEl.textContent='riconnessione…';});
 function handle(e){ try{var m=JSON.parse(e.data); if(!m)return; var p=m.path, d=m.data;
   if(p==='/'){ if(d&&d.copy) for(var k in d.copy) applyRemote(k,d.copy[k]); }
   else { var parts=p.split('/').filter(Boolean); /* /copy/<id> */ if(parts[0]==='copy'&&parts[1]) applyRemote(parts[1], parts[2]?undefined:d); }
 }catch(err){} }
 es.addEventListener('put',handle);
 es.addEventListener('patch',handle);
 // presence heartbeat
 var pid=Math.random().toString(36).slice(2,8);
 function beat(){ var who=(nameEl.value||'anon').slice(0,24); fetch(DB_URL+'/presence/'+pid+'.json',{method:'PUT',body:JSON.stringify({n:who,at:Date.now()})}).catch(function(){}); }
 beat(); setInterval(beat,15000);
 setInterval(function(){ fetch(DB_URL+'/presence.json').then(function(r){return r.json();}).then(function(p){ if(!p){document.getElementById('who').textContent='';return;} var now=Date.now(),names=[]; for(var k in p){ if(now-(p[k].at||0)<40000) names.push(p[k].n); } document.getElementById('who').textContent=names.length?('👥 '+names.length+' online: '+names.slice(0,5).join(', ')):''; }).catch(function(){}); },8000);
}
connect();
</script>
</body></html>
